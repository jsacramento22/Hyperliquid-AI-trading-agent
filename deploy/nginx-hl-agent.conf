# nginx site config for hl-agent.
#
# Drop this in /etc/nginx/sites-available/hl-agent then symlink it into
# /etc/nginx/sites-enabled/. Replace `your-droplet-ip-or-domain` with the
# droplet's IP address or your domain name.
#
# This exposes the FastAPI server (running on 127.0.0.1:8000) on port 80
# (or 443 once you've set up SSL) with HTTP basic auth protecting every
# /api/* endpoint. The bot's API has NO built-in auth — this nginx layer
# is the ONLY thing standing between strangers and your trading config.

server {
    listen 80;
    listen [::]:80;
    server_name your-droplet-ip-or-domain;

    # Increase timeout for the /api/account endpoint which can take up to
    # 5-8s when the Hyperliquid API is slow.
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;

    # Logging
    access_log /var/log/nginx/hl-agent.access.log;
    error_log /var/log/nginx/hl-agent.error.log warn;

    # === Health check (no auth — useful for uptime monitors) ===
    location = /api/health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # === All other /api/* routes require basic auth ===
    location /api/ {
        # CORS preflight bypass — MUST come before auth_basic, otherwise
        # the browser's OPTIONS request gets 401 and the real GET/POST
        # never fires. The `if` directive runs in the rewrite phase, which
        # is before the access phase where auth_basic lives.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Cache-Control, Pragma" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        auth_basic "hl-agent control panel";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strip the backend's CORS headers — FastAPI's CORSMiddleware sets
        # Access-Control-Allow-Origin etc. as well, which collides with the
        # ones we add below. Browsers reject duplicate CORS headers as
        # ambiguous, blocking the response.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Vary;

        # CORS headers on the actual response (after auth passes)
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Cache-Control, Pragma" always;
    }

    # Block everything else
    location / {
        return 404;
    }
}
